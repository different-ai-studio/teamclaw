# LiteLLM proxy config for the self-host stack.
#
# Mounted read-only at /app/config.yaml; the container is started with
# `--config /app/config.yaml`.
#
# model_list is intentionally EMPTY. general_settings.store_model_in_db is on,
# so models are added at runtime (admin UI or POST /model/new) and persist in
# the _litellm database — no rebuild/restart needed to add a provider.
#
# To bake models in statically instead, uncomment and add the provider key to
# .env (compose passes OPENAI_API_KEY / ANTHROPIC_API_KEY through):
#
# model_list:
#   - model_name: gpt-4o
#     litellm_params:
#       model: openai/gpt-4o
#       api_key: os.environ/OPENAI_API_KEY
#   - model_name: claude-opus-4-8
#     litellm_params:
#       model: anthropic/claude-opus-4-8
#       api_key: os.environ/ANTHROPIC_API_KEY

model_list:
  # ── frontend-facing tiers ────────────────────────────────────────────
  # The app selects a capability tier, not a vendor model. All three point at
  # deepseek-v4-pro for now; re-point a tier here to change what the app gets
  # without any client release.
  - model_name: default
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: pro
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: max
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── underlying vendor models ─────────────────────────────────────────
  # DeepSeek via its OpenAI-compatible endpoint. Routed through the generic
  # `openai/` provider + api_base rather than litellm's native `deepseek/`
  # provider: these model ids are newer than the pinned litellm build's model
  # map, so the native provider would reject them as unknown.
  - model_name: deepseek-v4-flash
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: deepseek-v4-pro
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Persist models added via the admin API/UI instead of requiring a config edit.
  store_model_in_db: true

litellm_settings:
  # Silently drop provider-unsupported params rather than erroring the request —
  # clients here are agent runtimes that send a superset of OpenAI params.
  drop_params: true
