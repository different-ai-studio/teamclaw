# EMQX 5.x — single JWT (HMAC/HS256) authenticator keyed by JWT_SECRET.
# The shared secret is injected via the EMQX_AUTHENTICATION__... env in compose;
# this file pins listeners and the auth mechanism shape.

node {
  name = "emqx@127.0.0.1"
  cookie = "teamclaw-self-host"
  # required by EMQX 5.x; mounting our own emqx.conf over the image default drops it
  data_dir = "/opt/emqx/data"
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  websocket.mqtt_path = "/mqtt"
}

# Image defaults still enable SSL/WSS (8883/8084). Disable them — self-host uses
# plaintext 1883 internally and Caddy-terminated WSS in production; on a 2GiB
# Podman VM the extra listeners push EMQX into OOM (connection closed by peer).
listeners.ssl.default {
  enable = false
}

listeners.wss.default {
  enable = false
}

dashboard.listeners.http.bind = 18083

authentication = [
  {
    mechanism = jwt
    use_jwks = false
    algorithm = "hmac-based"
    # NOTE: EMQX 5.10+ does NOT interpolate ${VAR} inside this file, so the real
    # secret is injected at runtime via EMQX_AUTHENTICATION__1__SECRET in
    # docker-compose.yml (Compose interpolates it at parse time). This literal is
    # only a placeholder and is overridden by that env var.
    secret = "${EMQX_JWT_SECRET}"
    secret_base64_encoded = true
    # accept the JWT from the MQTT password field
    from = password
    verify_claims = []
  }
]
