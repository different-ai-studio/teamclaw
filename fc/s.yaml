edition: 3.0.0
name: teamclaw-fc
access: default

resources:
  teamclaw-sync:
    component: fc3
    props:
      region: cn-shenzhen
      functionName: teamclaw-sync
      runtime: nodejs20
      handler: index.handler
      timeout: 30
      memorySize: 256
      logConfig: auto
      code: ./
      environmentVariables:
        ACCESS_KEY_ID: ${env('ACCESS_KEY_ID')}
        ACCESS_KEY_SECRET: ${env('ACCESS_KEY_SECRET')}
        ROLE_ARN: ${env('ROLE_ARN')}
        BUCKET: teamclaw-team
        REGION: cn-shenzhen
        ENDPOINT: https://oss-cn-shenzhen.aliyuncs.com
        LITELLM_URL: ${env('LITELLM_URL')}
        LITELLM_MASTER_KEY: ${env('LITELLM_MASTER_KEY')}
        # Default LiteLLM team max spend (USD) for new teams; unset in deploy env → FC may omit (code defaults to 1)
        LITELLM_DEFAULT_TEAM_MAX_BUDGET_USD: ${env('LITELLM_DEFAULT_TEAM_MAX_BUDGET_USD')}
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - POST
