<!doctype html>
<!--
  Throwaway prototype — verify Deep Chat can drive amuxd's async-202 + SSE contract.
  NOT wired into the build. Serve statically or open via a tiny http server, then
  point it at a running amuxd (see the "How to run" note at the bottom of the file).
-->
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deep Chat × amuxd — SSE 验证原型</title>
  <script type="module"
    src="https://unpkg.com/deep-chat@2.2.0/dist/deepChat.bundle.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f6f4ef; color: #222; }
    .bar { display: flex; gap: 8px; padding: 12px; align-items: center; flex-wrap: wrap;
           border-bottom: 1px solid #e2ddd3; }
    .bar input { padding: 6px 8px; border: 1px solid #d6d0c4; border-radius: 6px; font-size: 13px; }
    .bar input#base { width: 240px; }
    .bar input#token { width: 320px; }
    .bar input#agent { width: 140px; }
    .bar button { padding: 6px 14px; border: 0; border-radius: 6px; background: #e2603f;
                  color: #fff; cursor: pointer; font-size: 13px; }
    #status { font-size: 12px; color: #777; margin-left: auto; }
    .wrap { display: flex; justify-content: center; padding: 24px; }
  </style>
</head>
<body>
  <div class="bar">
    <label>amuxd URL <input id="base" value="http://127.0.0.1:8787" /></label>
    <label>Session Token <input id="token" placeholder="需含 sessions:write + events:read scope" /></label>
    <label>agent_type <input id="agent" value="claude" /></label>
    <button id="connect">连接 / 新建会话</button>
    <span id="status">未连接</span>
  </div>

  <div class="wrap">
    <deep-chat id="chat" style="width: 640px; height: 70vh; border-radius: 12px;"
      stream="true"
      demo="true"
      introMessage='{"text": "先点上方「连接 / 新建会话」，然后开始对话。"}'>
    </deep-chat>
  </div>

  <script type="module">
    const chat = document.getElementById('chat');
    const statusEl = document.getElementById('status');
    let base, token, sessionId;

    const setStatus = (t) => (statusEl.textContent = t);

    document.getElementById('connect').addEventListener('click', async () => {
      base = document.getElementById('base').value.replace(/\/$/, '');
      token = document.getElementById('token').value.trim();
      const agent_type = document.getElementById('agent').value.trim() || 'claude';
      if (!token) { setStatus('缺 token'); return; }
      setStatus('建会话中…');
      try {
        const res = await fetch(`${base}/v1/sessions`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', authorization: `Bearer ${token}` },
          body: JSON.stringify({ agent_type }),
        });
        if (!res.ok) throw new Error(`create ${res.status}: ${await res.text()}`);
        const snap = await res.json();
        sessionId = snap.session_id;
        setStatus(`已连接 · session ${sessionId.slice(0, 8)}`);
        // 从 demo 模式切到真实 handler
        chat.demo = false;
        wireHandler();
      } catch (e) {
        setStatus('失败: ' + e.message);
        console.error(e);
      }
    });

    function wireHandler() {
      // Deep Chat 自定义后端逃生口：每次用户发消息调用一次。
      // 我们负责：打开 SSE → POST prompt(202) → 把 token.delta 流式喂回。
      chat.connect = {
        stream: true,
        handler: (body, signals) => {
          const text = body.messages?.[body.messages.length - 1]?.text ?? '';
          const streamUrl =
            `${base}/v1/sessions/${sessionId}/stream?access_token=${encodeURIComponent(token)}`;
          const es = new EventSource(streamUrl);
          let opened = false;

          const finish = () => { try { es.close(); } catch {} signals.onClose(); };

          es.addEventListener('token.delta', (ev) => {
            if (!opened) { opened = true; signals.onOpen(); }
            try {
              const payload = JSON.parse(ev.data);        // SessionEvent
              const chunk = payload?.data?.text ?? '';
              if (chunk) signals.onResponse({ text: chunk }); // stream:true → 追加
            } catch (e) { console.warn('bad delta', e); }
          });

          es.addEventListener('turn.finished', finish);
          es.addEventListener('session.error', (ev) => {
            signals.onResponse({ error: ev.data || 'session.error' });
            finish();
          });
          es.onerror = () => { if (opened) finish(); else signals.onResponse({ error: 'SSE 连接失败' }); };

          // 用户点“停止”时取消这一轮
          signals.stopClicked.listener = () => {
            fetch(`${base}/v1/sessions/${sessionId}/cancel`, {
              method: 'POST',
              headers: { 'content-type': 'application/json', authorization: `Bearer ${token}` },
              body: JSON.stringify({}),
            }).catch(() => {});
            finish();
          };

          // SSE 挂好后再发 prompt（异步 202，token 从 SSE 回流）
          fetch(`${base}/v1/sessions/${sessionId}/prompt`, {
            method: 'POST',
            headers: { 'content-type': 'application/json', authorization: `Bearer ${token}` },
            body: JSON.stringify({ text }),
          }).then((r) => {
            if (!r.ok) r.text().then((t) => { signals.onResponse({ error: `prompt ${r.status}: ${t}` }); finish(); });
          }).catch((e) => { signals.onResponse({ error: String(e) }); finish(); });
        },
      };
    }
  </script>

  <!--
  ── How to run ─────────────────────────────────────────────────────────────
  1) 启动 amuxd 并开启 HTTP + 设置 root token。在 daemon 配置里加：
       [http]
       bind = "127.0.0.1:8787"
       token = "<ROOT_TOKEN>"     # 见 config/daemon_config.rs 的 HttpConfig
  2) 用 root token 换一个 session token（页面用的就是它）：
       curl -s http://127.0.0.1:8787/v1/auth/exchange \
         -H "authorization: Bearer <ROOT_TOKEN>" \
         -H "content-type: application/json" \
         -d '{"scopes":["sessions:write","sessions:read","events:read"],"ttl_seconds":3600}'
     复制返回的 "token"。
  3) 起个静态服务器打开本页面（避免 file:// 的 CORS 怪异）：
       npx serve apps/daemon/prototypes   →  访问 /deepchat-amuxd.html
  4) 填 amuxd URL + 上一步的 session token，点“连接 / 新建会话”，开始对话。
     若 token.delta 逐字渲染 = SSE 链路打通 ✅
  ── CORS 提示：daemon http/cors.rs 已放行 last-event-id 等；若浏览器报 CORS，
     确认 amuxd 允许该 Origin（本地 127.0.0.1 一般 OK）。
  -->
</body>
</html>
