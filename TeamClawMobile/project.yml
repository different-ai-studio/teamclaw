name: TeamClawMobile
options:
  bundleIdPrefix: tech.teamclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    PRODUCT_BUNDLE_IDENTIFIER: tech.teamclaw.mobile
    DEVELOPMENT_TEAM: "43G5A6G9QV"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  CocoaMQTT:
    url: https://github.com/emqx/CocoaMQTT.git
    from: 2.1.0
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: 0.4.0
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: 5.9.0
  swift-protobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: 1.28.0

targets:
  TeamClawMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TeamClawMobile
    info:
      path: TeamClawMobile/Info.plist
      properties:
        CFBundleDisplayName: TeamClaw
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleLocalizations:
          - en
          - zh-Hans
        CFBundleDevelopmentRegion: en
    settings:
      base:
        INFOPLIST_FILE: TeamClawMobile/Info.plist
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "teamclaw profile"
    dependencies:
      - package: CocoaMQTT
        product: CocoaMQTT
      - package: swift-markdown
        product: Markdown
      - package: Alamofire
        product: Alamofire
      - package: swift-protobuf
        product: SwiftProtobuf

  TeamClawMobileTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TeamClawMobileTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: TeamClawMobile

  TeamClawMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TeamClawMobileUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: TeamClawMobile
