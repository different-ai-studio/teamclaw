name: Release iOS (TestFlight)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_number:
        description: "Override build number (leave empty for auto-increment)"
        required: false

concurrency:
  group: release-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-ios:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 26+ for iOS 26 SDK (required by App Store since April 2026)
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app /Applications/Xcode.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      # ── Import certificate & provisioning profile ──
      - name: Install Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "Provisioning profile installed: $PROFILE_UUID"
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      # ── Set build number ──
      - name: Set version and build number
        working-directory: TeamClawMobile
        run: |
          # Version from tag (v1.0.0 → 1.0.0) or fallback
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi

          # Build number: input override or timestamp-based
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            BUILD="${{ github.event.inputs.build_number }}"
          else
            BUILD=$(date +%Y%m%d%H%M)
          fi

          echo "Version: $VERSION, Build: $BUILD"

          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" TeamClawMobile/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" TeamClawMobile/Info.plist

      # ── Resolve SPM packages ──
      - name: Resolve Swift packages
        working-directory: TeamClawMobile
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TeamClawMobile.xcodeproj \
            -scheme TeamClawMobile \
            -clonedSourcePackagesDirPath build/SourcePackages

      # ── Archive ──
      - name: Archive
        working-directory: TeamClawMobile
        run: |
          xcodebuild archive \
            -project TeamClawMobile.xcodeproj \
            -scheme TeamClawMobile \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/TeamClawMobile.xcarchive \
            -clonedSourcePackagesDirPath build/SourcePackages

      # ── Export IPA ──
      - name: Export IPA
        working-directory: TeamClawMobile
        run: |
          xcodebuild -exportArchive \
            -archivePath build/TeamClawMobile.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

          ls -la build/export/

      # ── Upload to TestFlight ──
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          # Write API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          IPA_PATH=$(find TeamClawMobile/build/export -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "Error: No IPA found in TeamClawMobile/build/export/"
            ls -la TeamClawMobile/build/export/ 2>/dev/null || echo "Export directory does not exist"
            exit 1
          fi
          echo "Uploading: $IPA_PATH"

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # ── Cleanup ──
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
