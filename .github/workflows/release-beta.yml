name: Release (Beta, default TeamClaw)

# Beta release channel for the *default, non-branded* TeamClaw build.
# Unlike release.yml this workflow:
#   1. Never injects copilot branding (no private branding repo clone).
#   2. Never creates a GitHub Release / uploads GitHub binaries.
#   3. Publishes installers + the auto-update manifest only to Alibaba Cloud OSS,
#      under the dedicated `beta/` prefix (isolated from the stable `releases/`
#      channel), and renders a GitHub-style release page at `beta/index.html`.
#   4. Is triggered manually; the `tag` input is a beta version tag
#      (e.g. v0.2.8-beta.1) used as the OSS path + version label.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Beta version tag to publish (e.g. v0.2.8-beta.1)"
        required: true
        type: string

concurrency:
  group: release-oss-beta-${{ github.event.inputs.tag }}
  cancel-in-progress: true

env:
  OSS_PREFIX: beta
  # Public CDN base for URLs written into latest.json / the release page.
  # Override via repo variable OSS_CDN_BASE if the bucket is fronted by a
  # different domain.
  CDN_BASE: ${{ vars.OSS_CDN_BASE || 'https://teamclaw.ucar.cc' }}

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Write beta build config from secret
        env:
          BUILD_CONFIG_BETA: ${{ secrets.BUILD_CONFIG_BETA }}
        shell: bash
        run: |
          if [ -z "$BUILD_CONFIG_BETA" ]; then
            echo "::error::BUILD_CONFIG_BETA secret not set — the beta build requires it (contains cloudApiUrl etc.)"
            exit 1
          fi
          printf '%s' "$BUILD_CONFIG_BETA" > build.config.json
          echo "✅ Beta build config written from BUILD_CONFIG_BETA secret"
          python3 -c "import json; print('   cloudApiUrl ->', json.load(open('build.config.json')).get('cloudApiUrl'))"

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm install --no-save @tauri-apps/cli
          echo "test" > /tmp/test_sign_file
          npx @tauri-apps/cli signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" /tmp/test_sign_file
          echo "✅ Signing key verified successfully"
          rm -f /tmp/test_sign_file /tmp/test_sign_file.sig

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./apps/desktop -> target
          key: ${{ matrix.target }}

      - name: Install protoc (for prost_build)
        run: brew install protobuf

      # Sync all four version sources (incl. apps/daemon/Cargo.toml, the bundled
      # amuxd) + Cargo.lock to the tag version, then enforce the bump. Beta builds
      # label the OSS release with the tag input but otherwise build from source-
      # file versions, so without this the bundled amuxd version never changes and
      # clients never force-upgrade the daemon. Runs after Rust + protoc are
      # available because the Cargo.lock sync compiles teamclaw-introspect/amuxd.
      - name: Sync + verify version bump (bundled amuxd)
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          node scripts/bump-desktop-version.mjs "$VERSION" --allow-noop
          ./scripts/sync-cargo-lock-version.sh
          ./scripts/verify-release-version-bump.sh "$VERSION"

      - name: Build all (parallel)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          mkdir -p apps/desktop/binaries

          (
            set -e
            pnpm install
            echo "pnpm install done, building frontend..."
            # Do NOT set BUILD_ENV: it selects build.config.<env>.json and
            # BUILD_ENV=production deep-merges build.config.production.json
            # (cloudApiUrl=cloud.ucar.cc) OVER the beta build.config.json written
            # from the secret, silently baking the wrong backend. The
            # secret-written build.config.json is the sole source; `vite build`
            # already runs in production mode regardless.
            pnpm --filter @teamclaw/app build
            echo "frontend build done"
          ) > /tmp/frontend.log 2>&1 &
          PID_FRONTEND=$!

          (
            set -e
            echo "Building teamclaw-introspect for ${{ matrix.target }}..."
            cargo build --release --locked --manifest-path apps/desktop/Cargo.toml -p teamclaw-introspect --target ${{ matrix.target }} --target-dir apps/desktop/target
            cp apps/desktop/target/${{ matrix.target }}/release/teamclaw-introspect apps/desktop/binaries/teamclaw-introspect-${{ matrix.target }}
            chmod +x apps/desktop/binaries/teamclaw-introspect-${{ matrix.target }}
            echo "teamclaw-introspect ready"
          ) > /tmp/introspect.log 2>&1 &
          PID_INTROSPECT=$!

          (
            set -e
            echo "Building amuxd for ${{ matrix.target }}..."
            cargo build --release --locked --manifest-path apps/daemon/Cargo.toml -p amuxd --target ${{ matrix.target }} --target-dir apps/desktop/target
            cp apps/desktop/target/${{ matrix.target }}/release/amuxd apps/desktop/binaries/amuxd-${{ matrix.target }}
            chmod +x apps/desktop/binaries/amuxd-${{ matrix.target }}
            echo "amuxd ready"
          ) > /tmp/amuxd.log 2>&1 &
          PID_AMUXD=$!

          (
            if [ -z "$APPLE_CERTIFICATE" ]; then
              echo "No certificate, using ad-hoc signing."
              exit 0
            fi
            set -e
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
            CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1)
            CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
            echo "Certificate imported: $CERT_ID"
          ) > /tmp/cert.log 2>&1 &
          PID_CERT=$!

          FAILED=0
          wait $PID_FRONTEND   || { echo "::error::Frontend build failed:"; cat /tmp/frontend.log; FAILED=1; }
          wait $PID_INTROSPECT || { echo "::error::introspect build failed:"; cat /tmp/introspect.log; FAILED=1; }
          wait $PID_AMUXD      || { echo "::error::amuxd build failed:"; cat /tmp/amuxd.log; FAILED=1; }
          wait $PID_CERT       || { echo "::error::Certificate import failed:"; cat /tmp/cert.log; FAILED=1; }
          if [ "$FAILED" -ne 0 ]; then exit 1; fi
          echo "All parallel tasks completed"
          ls -lh apps/desktop/binaries/

      - name: Finalize tauri.conf.json (version from tag + frontend prebuilt + OSS updater endpoint)
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          python3 - <<EOF
          import json, os, re, sys
          manifest_url = '${{ env.CDN_BASE }}/${{ env.OSS_PREFIX }}/latest.json'

          # Authoritatively derive the app version from the beta tag so the built
          # installer filename + baked app version match latest.json (published
          # from the same tag). Without this the source version drifts from the
          # tag and the beta page advertises e.g. 0.2.20-beta.3 while the DMG is
          # TeamClaw_0.2.19_*, which also breaks the updater version comparison.
          tag = os.environ['TAG']
          version = tag[1:] if tag.startswith('v') else tag
          if not re.match(r'^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$', version):
              print(f'::error::Tag {tag!r} does not yield a valid semver version ({version!r})')
              sys.exit(1)
          print('Syncing app version ->', version)

          conf_path = 'apps/desktop/tauri.conf.json'
          with open(conf_path) as f:
              conf = json.load(f)
          conf['version'] = version
          conf['build']['beforeBuildCommand'] = 'echo frontend already built'
          conf.setdefault('plugins', {}).setdefault('updater', {})['endpoints'] = [manifest_url]
          with open(conf_path, 'w') as f:
              json.dump(conf, f, indent=2)

          # Keep the Rust crates (desktop binary + bundled amuxd sidecar) in lockstep.
          for cargo in ('apps/desktop/Cargo.toml', 'apps/daemon/Cargo.toml'):
              txt = open(cargo).read()
              txt = re.sub(r'(?m)^version = "[^"]*"', f'version = "{version}"', txt, count=1)
              open(cargo, 'w').write(txt)

          # package.json drives any in-app version read from the JS side.
          pkg_path = 'package.json'
          with open(pkg_path) as f:
              pkg = json.load(f)
          pkg['version'] = version
          with open(pkg_path, 'w') as f:
              json.dump(pkg, f, indent=2)
              f.write('\n')

          # The custom Rust updater (apps/desktop/src/commands/updater.rs) reads
          # its endpoints from build.config.json -> app.updater.endpoints via
          # build.rs (baked into UPDATER_ENDPOINTS at compile time), NOT from
          # tauri.conf.json's plugins.updater. Without this, the beta build has
          # no custom endpoints and falls back to GitHub API mode, failing with
          # "Updater token not configured (GitHub mode requires UPDATER_GITHUB_TOKEN)".
          bc_path = 'build.config.json'
          with open(bc_path) as f:
              bc = json.load(f)
          bc.setdefault('app', {}).setdefault('updater', {})['endpoints'] = [manifest_url]
          with open(bc_path, 'w') as f:
              json.dump(bc, f, indent=2)

          print('Updater endpoint ->', manifest_url)
          EOF

      # Build only — no tagName, so tauri-action does NOT create a GitHub Release.
      - uses: tauri-apps/tauri-action@v1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DEVICE_JWT_SECRET: ${{ secrets.DEVICE_JWT_SECRET }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        with:
          # --features beta-devtools enables the WebKit inspector in this release
          # build so the live beta app's console/network can be inspected.
          args: "--target ${{ matrix.target }} --features beta-devtools"

      - name: Upload installers to OSS + emit updater fragment
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          MATRIX_TARGET: ${{ matrix.target }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "::error::OSS secrets not configured — cannot publish"
            exit 1
          fi
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          python3 - <<'EOF'
          import oss2, os, glob, json, sys, hashlib

          def filemeta(p):
              h = hashlib.sha256()
              with open(p, 'rb') as f:
                  for chunk in iter(lambda: f.read(1 << 20), b''):
                      h.update(chunk)
              return os.path.getsize(p), h.hexdigest()

          target = os.environ['MATRIX_TARGET']
          tag = os.environ['TAG']
          prefix = os.environ['OSS_PREFIX']
          cdn = os.environ['CDN_BASE'].rstrip('/')
          arch = 'aarch64' if target.startswith('aarch64') else 'x86_64'
          plat_key = f'darwin-{arch}'

          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          endpoint = os.environ['OSS_ENDPOINT']
          if not endpoint.startswith('http'):
              endpoint = 'https://' + endpoint
          bucket = oss2.Bucket(auth, endpoint, os.environ['OSS_BUCKET'])

          # tauri-action bundles into the cargo workspace target dir (repo-root
          # target/), not apps/desktop/target/. Accept either to be safe.
          _cands = [f'target/{target}/release/bundle', f'apps/desktop/target/{target}/release/bundle']
          base = next((b for b in _cands if os.path.isdir(b)), _cands[0])
          print('bundle base:', base)
          arch_label = 'Apple Silicon' if arch == 'aarch64' else 'Intel'

          def upload(local, name):
              key = f'{prefix}/{tag}/{name}'
              print(f'Uploading {name} -> oss://{os.environ["OSS_BUCKET"]}/{key}')
              bucket.put_object_from_file(key, local)
              url = f'{cdn}/{key}'
              print(f'✅ {url}')
              return url

          downloads = []
          # dmg (user-facing installer); name already carries version+arch
          for dmg in glob.glob(f'{base}/dmg/*.dmg'):
              dmg_url = upload(dmg, os.path.basename(dmg))
              size, sha = filemeta(dmg)
              downloads.append({
                  'os': 'macos', 'arch': arch,
                  'label': arch_label, 'sub': f"macOS · {'arm64' if arch == 'aarch64' else 'x64'}",
                  'filename': os.path.basename(dmg), 'url': dmg_url,
                  'size': size, 'sha256': sha,
              })

          # updater artifact: the file that has a sibling .sig
          sigs = glob.glob(f'{base}/macos/*.sig')
          if not sigs:
              print('::error::No macOS updater .sig found — is createUpdaterArtifacts enabled?')
              sys.exit(1)
          sig_path = sigs[0]
          artifact_path = sig_path[:-4]  # strip .sig
          # rename per-arch to avoid collision between aarch64/x86_64 in OSS
          ext = artifact_path.split('TeamClaw', 1)[-1]  # e.g. '.app.tar.gz'
          updater_name = f'TeamClaw_{tag}_{arch}{ext}'
          url = upload(artifact_path, updater_name)
          with open(sig_path) as f:
              signature = f.read().strip()

          frag = {
              'platform': plat_key,
              'updater': {'signature': signature, 'url': url},
              'downloads': downloads,
          }
          os.makedirs('frag', exist_ok=True)
          with open(f'frag/{plat_key}.json', 'w') as f:
              json.dump(frag, f)
          print('Fragment:', json.dumps(frag)[:300])
          EOF

      - name: Upload standalone amuxd to OSS + emit amuxd fragment
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          MATRIX_TARGET: ${{ matrix.target }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "::error::OSS secrets not configured — cannot publish amuxd"
            exit 1
          fi
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          BIN="apps/desktop/binaries/amuxd-${MATRIX_TARGET}" \
          AMUXD_OS=macos \
          python3 scripts/publish-amuxd-fragment.py

      - name: Upload updater fragment artifact
        uses: actions/upload-artifact@v7
        with:
          name: frag-${{ matrix.target }}
          path: frag/*.json
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Write beta build config from secret
        env:
          BUILD_CONFIG_BETA: ${{ secrets.BUILD_CONFIG_BETA }}
        shell: bash
        run: |
          if [ -z "$BUILD_CONFIG_BETA" ]; then
            echo "::error::BUILD_CONFIG_BETA secret not set — the beta build requires it (contains cloudApiUrl etc.)"
            exit 1
          fi
          printf '%s' "$BUILD_CONFIG_BETA" > build.config.json
          echo "✅ Beta build config written from BUILD_CONFIG_BETA secret"
          python3 -c "import json; print('   cloudApiUrl ->', json.load(open('build.config.json')).get('cloudApiUrl'))"

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          npm install --no-save @tauri-apps/cli
          echo "test" > "$RUNNER_TEMP/test_sign_file"
          npx @tauri-apps/cli signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$RUNNER_TEMP/test_sign_file"
          echo "✅ Signing key verified successfully"
          rm -f "$RUNNER_TEMP/test_sign_file" "$RUNNER_TEMP/test_sign_file.sig"

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/AppData/Local/pnpm/store/v3
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./apps/desktop -> target

      - name: Install protoc (for prost_build)
        shell: bash
        run: choco install protoc -y

      # See build-macos: sync all four version sources + Cargo.lock to the tag and
      # enforce the bundled amuxd bump. Runs after Rust + protoc are available
      # because the Cargo.lock sync compiles teamclaw-introspect/amuxd.
      - name: Sync + verify version bump (bundled amuxd)
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          node scripts/bump-desktop-version.mjs "$VERSION" --allow-noop
          ./scripts/sync-cargo-lock-version.sh
          ./scripts/verify-release-version-bump.sh "$VERSION"

      - name: Install dependencies and build frontend
        # No BUILD_ENV: it selects build.config.<env>.json. BUILD_ENV=production
        # would deep-merge build.config.production.json (cloudApiUrl=cloud.ucar.cc)
        # over the beta build.config.json, baking the wrong backend.
        run: |
          pnpm install
          pnpm --filter @teamclaw/app build

      - name: Prepare binaries directory
        shell: bash
        run: mkdir -p apps/desktop/binaries

      - name: Build teamclaw-introspect sidecar
        shell: bash
        run: |
          cargo build --release --locked --manifest-path apps/desktop/Cargo.toml -p teamclaw-introspect --target-dir apps/desktop/target
          cp apps/desktop/target/release/teamclaw-introspect.exe apps/desktop/binaries/teamclaw-introspect-x86_64-pc-windows-msvc.exe
          echo "teamclaw-introspect ready"

      - name: Build amuxd sidecar
        shell: bash
        run: |
          cargo build --release --locked --manifest-path apps/daemon/Cargo.toml -p amuxd --target-dir apps/desktop/target
          cp apps/desktop/target/release/amuxd.exe apps/desktop/binaries/amuxd-x86_64-pc-windows-msvc.exe
          echo "amuxd sidecar ready"

      - name: Finalize tauri.conf.json (version from tag + frontend prebuilt + OSS updater endpoint)
        shell: python
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          import json, os, re, sys
          manifest_url = '${{ env.CDN_BASE }}/${{ env.OSS_PREFIX }}/latest.json'

          # Authoritatively derive the app version from the beta tag (see the
          # macOS job for the rationale) so the installer filename + baked app
          # version match the tag-derived latest.json.
          tag = os.environ['TAG']
          version = tag[1:] if tag.startswith('v') else tag
          if not re.match(r'^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$', version):
              print(f'::error::Tag {tag!r} does not yield a valid semver version ({version!r})')
              sys.exit(1)
          print('Syncing app version ->', version)

          conf_path = 'apps/desktop/tauri.conf.json'
          with open(conf_path) as f:
              conf = json.load(f)
          conf['version'] = version
          conf['build']['beforeBuildCommand'] = 'echo frontend already built'
          conf.setdefault('plugins', {}).setdefault('updater', {})['endpoints'] = [manifest_url]
          with open(conf_path, 'w') as f:
              json.dump(conf, f, indent=2)

          for cargo in ('apps/desktop/Cargo.toml', 'apps/daemon/Cargo.toml'):
              txt = open(cargo).read()
              txt = re.sub(r'(?m)^version = "[^"]*"', f'version = "{version}"', txt, count=1)
              open(cargo, 'w').write(txt)

          pkg_path = 'package.json'
          with open(pkg_path) as f:
              pkg = json.load(f)
          pkg['version'] = version
          with open(pkg_path, 'w') as f:
              json.dump(pkg, f, indent=2)
              f.write('\n')

          # The custom Rust updater reads endpoints from build.config.json ->
          # app.updater.endpoints via build.rs (baked into UPDATER_ENDPOINTS),
          # NOT from tauri.conf.json's plugins.updater. Without this the beta
          # build falls back to GitHub API mode and fails with
          # "Updater token not configured (GitHub mode requires UPDATER_GITHUB_TOKEN)".
          bc_path = 'build.config.json'
          with open(bc_path) as f:
              bc = json.load(f)
          bc.setdefault('app', {}).setdefault('updater', {})['endpoints'] = [manifest_url]
          with open(bc_path, 'w') as f:
              json.dump(bc, f, indent=2)

          print('Updater endpoint ->', manifest_url)

      # Build only — no tagName, so tauri-action does NOT create a GitHub Release.
      - uses: tauri-apps/tauri-action@v1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DEVICE_JWT_SECRET: ${{ secrets.DEVICE_JWT_SECRET }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        with:
          args: "--bundles nsis -- --no-default-features"

      - name: Upload installer to OSS + emit updater fragment
        shell: bash
        env:
          # Windows runner Python defaults to cp1252 stdout; force UTF-8 so the
          # ✅ prints don't crash with UnicodeEncodeError.
          PYTHONUTF8: "1"
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "::error::OSS secrets not configured — cannot publish"
            exit 1
          fi
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          python3 - <<'EOF'
          import oss2, os, glob, json, sys, hashlib

          def filemeta(p):
              h = hashlib.sha256()
              with open(p, 'rb') as f:
                  for chunk in iter(lambda: f.read(1 << 20), b''):
                      h.update(chunk)
              return os.path.getsize(p), h.hexdigest()

          tag = os.environ['TAG']
          prefix = os.environ['OSS_PREFIX']
          cdn = os.environ['CDN_BASE'].rstrip('/')
          plat_key = 'windows-x86_64'

          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          endpoint = os.environ['OSS_ENDPOINT']
          if not endpoint.startswith('http'):
              endpoint = 'https://' + endpoint
          bucket = oss2.Bucket(auth, endpoint, os.environ['OSS_BUCKET'])

          # tauri-action bundles into the cargo workspace target dir (repo-root
          # target/), not apps/desktop/target/. Accept either to be safe.
          _cands = ['target/release/bundle', 'apps/desktop/target/release/bundle']
          base = next((b for b in _cands if os.path.isdir(b)), _cands[0])
          print('bundle base:', base)

          def upload(local, name):
              key = f'{prefix}/{tag}/{name}'
              print(f'Uploading {name} -> oss://{os.environ["OSS_BUCKET"]}/{key}')
              bucket.put_object_from_file(key, local)
              url = f'{cdn}/{key}'
              print(f'✅ {url}')
              return url

          downloads = []
          # user-facing installer (.exe)
          for exe in glob.glob(f'{base}/nsis/*-setup.exe'):
              exe_url = upload(exe, os.path.basename(exe))
              size, sha = filemeta(exe)
              downloads.append({
                  'os': 'windows', 'arch': 'x86_64',
                  'label': 'Windows', 'sub': 'x64 · .exe',
                  'filename': os.path.basename(exe), 'url': exe_url,
                  'size': size, 'sha256': sha,
              })

          # updater artifact: file with a sibling .sig (nsis dir)
          sigs = glob.glob(f'{base}/nsis/*.sig')
          if not sigs:
              print('::error::No Windows updater .sig found — is createUpdaterArtifacts enabled?')
              sys.exit(1)
          sig_path = sigs[0]
          artifact_path = sig_path[:-4]
          # the windows updater artifact IS the -setup.exe; reuse its url if already uploaded
          if os.path.basename(artifact_path).endswith('-setup.exe') and downloads:
              url = downloads[0]['url']
          else:
              url = upload(artifact_path, os.path.basename(artifact_path))
          with open(sig_path) as f:
              signature = f.read().strip()

          frag = {
              'platform': plat_key,
              'updater': {'signature': signature, 'url': url},
              'downloads': downloads,
          }
          os.makedirs('frag', exist_ok=True)
          with open(f'frag/{plat_key}.json', 'w') as f:
              json.dump(frag, f)
          print('Fragment:', json.dumps(frag)[:300])
          EOF

      - name: Upload standalone amuxd to OSS + emit amuxd fragment
        shell: bash
        env:
          PYTHONUTF8: "1"
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "::error::OSS secrets not configured — cannot publish amuxd"
            exit 1
          fi
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          BIN="apps/desktop/binaries/amuxd-x86_64-pc-windows-msvc.exe" \
          AMUXD_OS=windows \
          MATRIX_TARGET=x86_64-pc-windows-msvc \
          python3 scripts/publish-amuxd-fragment.py

      - name: Upload updater fragment artifact
        uses: actions/upload-artifact@v7
        with:
          name: frag-windows
          path: frag/*.json
          if-no-files-found: error

  build-amuxd-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust target + protoc
        run: |
          rustup target add ${{ matrix.target }}
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/daemon -> target
          key: amuxd-${{ matrix.target }}

      - name: Build amuxd
        run: |
          mkdir -p apps/desktop/binaries
          # NB: no --locked — the repo's Cargo.lock drifts slightly from
          # Cargo.toml and the desktop build (tauri-action) tolerates it by
          # updating the lock; match that here rather than hard-failing.
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            # Cross-compiling amuxd for arm64 drags in openssl-sys (+ other C
            # deps) which needs an arm64 sysroot the host runner doesn't have.
            # `cross` runs the build in a Debian container with working multiarch;
            # Cross.toml's pre-build installs libssl-dev:arm64 + protoc there and
            # points openssl-sys at the arm64 multiarch lib/include dirs.
            cargo install cross --locked --version 0.2.5
            cross build --release --manifest-path apps/daemon/Cargo.toml -p amuxd --target ${{ matrix.target }} --target-dir apps/desktop/target
          else
            cargo build --release --manifest-path apps/daemon/Cargo.toml -p amuxd --target ${{ matrix.target }} --target-dir apps/desktop/target
          fi
          cp apps/desktop/target/${{ matrix.target }}/release/amuxd apps/desktop/binaries/amuxd-${{ matrix.target }}
          chmod +x apps/desktop/binaries/amuxd-${{ matrix.target }}

      - name: Upload standalone amuxd to OSS + emit amuxd fragment
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          MATRIX_TARGET: ${{ matrix.target }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "::error::OSS secrets not configured — cannot publish amuxd"
            exit 1
          fi
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          BIN="apps/desktop/binaries/amuxd-${{ matrix.target }}" \
          AMUXD_OS=linux \
          python3 scripts/publish-amuxd-fragment.py

      - name: Upload updater fragment artifact
        uses: actions/upload-artifact@v7
        with:
          name: frag-amuxd-linux-${{ matrix.target }}
          path: frag/*.json
          if-no-files-found: error

  publish-manifest:
    needs: [build-macos, build-windows, build-amuxd-linux]
    # Publish as long as the desktop installers built. The standalone amuxd
    # binaries are a supplementary add-on — a flaky arm64 cross-compile must
    # not block the core desktop beta release. Whatever amuxd fragments made
    # it into artifacts get rendered; any missing platform is simply omitted.
    if: always() && needs.build-macos.result == 'success' && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all updater fragments
        uses: actions/download-artifact@v8
        with:
          pattern: frag-*
          path: frags
          merge-multiple: true

      - name: Assemble latest.json + release page and publish to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "::error::OSS secrets not configured — cannot publish manifest"
            exit 1
          fi
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          python3 - <<'EOF'
          import oss2, os, glob, json, sys, html
          from datetime import datetime, timezone

          tag = os.environ['TAG']
          version = tag[1:] if tag.startswith('v') else tag
          prefix = os.environ['OSS_PREFIX']
          cdn = os.environ['CDN_BASE'].rstrip('/')

          platforms = {}       # for latest.json (updater)
          downloads = []       # desktop installers (user-facing)
          amuxd_downloads = [] # standalone amuxd daemon binaries
          for frag_file in glob.glob('frags/*.json'):
              with open(frag_file) as f:
                  frag = json.load(f)
              # Standalone-amuxd fragments carry an 'amuxd' key instead of the
              # updater/platform shape the desktop fragments use.
              if 'amuxd' in frag:
                  amuxd_downloads.append(frag['amuxd'])
                  continue
              platforms[frag['platform']] = frag['updater']
              downloads.extend(frag.get('downloads', []))
          if not platforms:
              print('::error::No updater fragments found — nothing to publish')
              sys.exit(1)

          # Guard against version drift: the tag-derived version published in
          # latest.json MUST match the version baked into every installer
          # filename (TeamClaw_<version>_<arch>.dmg / *-setup.exe). If the build
          # jobs failed to sync the source version to the tag, fail loudly here
          # instead of shipping a page that advertises one version but serves
          # binaries stamped with another.
          mismatched = [d['filename'] for d in downloads if version not in d.get('filename', '')]
          if mismatched:
              print('::error::Installer filename(s) do not carry the published '
                    f'version {version!r}: {mismatched}. Version sync from the tag '
                    'is broken — refusing to publish a mismatched beta.')
              sys.exit(1)
          print(f'✅ All {len(downloads)} installer(s) carry version {version}')

          # Stable display order: macOS Apple Silicon, macOS Intel, Windows
          okey = {('macos', 'aarch64'): 0, ('macos', 'x86_64'): 1, ('windows', 'x86_64'): 2}
          downloads.sort(key=lambda d: okey.get((d.get('os'), d.get('arch')), 9))

          # amuxd standalone daemon binaries: macOS arm64/x64, Linux arm64/x64, Windows x64
          amkey = {
              ('macos', 'aarch64'): 0, ('macos', 'x86_64'): 1,
              ('linux', 'aarch64'): 2, ('linux', 'x86_64'): 3,
              ('windows', 'x86_64'): 4,
          }
          amuxd_downloads.sort(key=lambda d: amkey.get((d.get('os'), d.get('arch')), 9))

          pub_date = datetime.now(timezone.utc).isoformat(timespec='seconds')

          manifest = {
              'version': version,
              'notes': f'TeamClaw {tag} (beta)',
              'pub_date': pub_date,
              'platforms': platforms,
          }
          manifest_str = json.dumps(manifest, indent=2) + '\n'

          def human(n):
              f = float(n)
              for u in ['B', 'KB', 'MB', 'GB']:
                  if f < 1024 or u == 'GB':
                      return f'{f:.1f} {u}'
                  f /= 1024

          def short_sha(h):
              return (h[:16] + '…' + h[-8:]) if len(h) > 26 else h

          def find(o, a=None):
              return next((d['url'] for d in downloads if d.get('os') == o and (a is None or d.get('arch') == a)), '')

          mac_arm, mac_x64, win_url = find('macos', 'aarch64'), find('macos', 'x86_64'), find('windows')

          # --- one-click install scripts (baked with this release's URLs) ---
          install_sh = '''#!/bin/bash
          set -euo pipefail
          case "$(uname -m)" in
            arm64) DMG_URL="__ARM__";;
            x86_64) DMG_URL="__X64__";;
            *) echo "Unsupported arch: $(uname -m)"; exit 1;;
          esac
          [ -z "$DMG_URL" ] && { echo "No macOS build for this arch"; exit 1; }
          echo "Installing Beta ($(uname -m))..."
          DMG=$(mktemp /tmp/teamclaw-install-XXXXXX.dmg)
          curl -L --progress-bar -o "$DMG" "$DMG_URL"
          MOUNT=$(hdiutil attach "$DMG" -nobrowse 2>&1 | grep -E '/Volumes/' | tail -1 | awk -F'\\t' '{print $NF}')
          APP=$(find "$MOUNT" -maxdepth 1 -name "*.app" -type d | head -1)
          [ -z "$APP" ] && { echo "No .app in DMG"; hdiutil detach "$MOUNT" -quiet; rm -f "$DMG"; exit 1; }
          APP_NAME=$(basename "$APP" .app)
          pgrep -x "$APP_NAME" >/dev/null 2>&1 && { osascript -e "tell application \\"${APP_NAME}\\" to quit" 2>/dev/null || true; sleep 2; }
          rm -rf "/Applications/${APP_NAME}.app"; cp -R "$APP" /Applications/
          xattr -dr com.apple.quarantine "/Applications/${APP_NAME}.app" 2>/dev/null || true
          hdiutil detach "$MOUNT" -quiet; rm -f "$DMG"
          echo "Done. Opening ${APP_NAME}..."; open "/Applications/${APP_NAME}.app"
          '''.replace('__ARM__', mac_arm).replace('__X64__', mac_x64)

          install_ps1 = '''$ErrorActionPreference = 'Stop'
          $url = '__WIN__'
          if (-not $url) { Write-Error 'No Windows build available'; exit 1 }
          $exe = Join-Path $env:TEMP 'TeamClaw-beta-setup.exe'
          Write-Host 'Downloading TeamClaw Beta...'
          Invoke-WebRequest -Uri $url -OutFile $exe
          Write-Host 'Installing...'
          Start-Process -FilePath $exe -ArgumentList '/S' -Wait
          Remove-Item $exe -Force -ErrorAction SilentlyContinue
          Write-Host 'TeamClaw Beta installed.'
          '''.replace('__WIN__', win_url)

          # --- standalone amuxd install scripts (baked with this release's URLs) ---
          def amuxd_url(o, a):
              return next((d['url'] for d in amuxd_downloads
                           if d.get('os') == o and d.get('arch') == a), '')

          am_mac_arm = amuxd_url('macos', 'aarch64')
          am_mac_x64 = amuxd_url('macos', 'x86_64')
          am_lin_arm = amuxd_url('linux', 'aarch64')
          am_lin_x64 = amuxd_url('linux', 'x86_64')
          am_win_x64 = amuxd_url('windows', 'x86_64')

          # POSIX (macOS + Linux): download to ~/.amuxd/bin/amuxd (the path
          # `amuxd install-service` expects), symlink onto PATH, then onboard
          # (interactive) and register the OS service. Run via `bash <(curl …)`
          # so `amuxd init`'s stdin stays attached to the terminal.
          install_amuxd_sh = '''#!/bin/bash
          set -euo pipefail
          OS=$(uname -s); ARCH=$(uname -m)
          case "$OS-$ARCH" in
            Darwin-arm64)  URL="__MAC_ARM__";;
            Darwin-x86_64) URL="__MAC_X64__";;
            Linux-aarch64) URL="__LIN_ARM__";;
            Linux-arm64)   URL="__LIN_ARM__";;
            Linux-x86_64)  URL="__LIN_X64__";;
            *) echo "Unsupported platform: $OS-$ARCH"; exit 1;;
          esac
          [ -z "$URL" ] && { echo "No amuxd build for $OS-$ARCH"; exit 1; }
          BIN_DIR="$HOME/.amuxd/bin"
          mkdir -p "$BIN_DIR"
          echo "Downloading amuxd ($OS-$ARCH)..."
          curl -L --progress-bar -o "$BIN_DIR/amuxd" "$URL"
          chmod +x "$BIN_DIR/amuxd"
          [ "$OS" = "Darwin" ] && xattr -dr com.apple.quarantine "$BIN_DIR/amuxd" 2>/dev/null || true
          # Put amuxd on PATH (best-effort; falls back to ~/.amuxd/bin note).
          for d in /usr/local/bin "$HOME/.local/bin"; do
            if [ -w "$d" ] || mkdir -p "$d" 2>/dev/null && [ -w "$d" ]; then
              ln -sf "$BIN_DIR/amuxd" "$d/amuxd"; LINKED="$d/amuxd"; break
            fi
          done
          AMUXD="${LINKED:-$BIN_DIR/amuxd}"
          echo "Installed amuxd -> $AMUXD"
          "$AMUXD" --version || true
          # Onboard if not already configured, then register the OS service.
          if [ ! -f "$HOME/.amuxd/backend.toml" ]; then
            echo; echo "Onboarding this daemon (paste your teamclaw://invite deeplink)..."
            "$AMUXD" init || { echo "Onboarding skipped — run: amuxd init && amuxd install-service"; exit 0; }
          fi
          "$AMUXD" install-service
          echo "Done. amuxd is running as a background service. Check: amuxd status"
          '''.replace('__MAC_ARM__', am_mac_arm).replace('__MAC_X64__', am_mac_x64) \
             .replace('__LIN_ARM__', am_lin_arm).replace('__LIN_X64__', am_lin_x64)

          # Windows: download to %USERPROFILE%\\.amuxd\\bin\\amuxd.exe, onboard,
          # then register the login scheduled task via `amuxd install-service`.
          install_amuxd_ps1 = '''$ErrorActionPreference = 'Stop'
          $url = '__WIN_X64__'
          if (-not $url) { Write-Error 'No amuxd build available'; exit 1 }
          $binDir = Join-Path $env:USERPROFILE '.amuxd\\bin'
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          $exe = Join-Path $binDir 'amuxd.exe'
          Write-Host 'Downloading amuxd...'
          Invoke-WebRequest -Uri $url -OutFile $exe
          & $exe --version
          if (-not (Test-Path (Join-Path $env:USERPROFILE '.amuxd\\backend.toml'))) {
            Write-Host 'Onboarding this daemon (paste your teamclaw://invite deeplink)...'
            & $exe init
          }
          & $exe install-service
          Write-Host 'Done. amuxd is running as a background service. Check: amuxd status'
          '''.replace('__WIN_X64__', am_win_x64)

          # --- release page (logo + size + truncated sha + copy + one-liners) ---
          logo_url = f'{cdn}/{prefix}/logo.png'
          mac_cmd = f'curl -fsSL {cdn}/{prefix}/install.sh | bash'
          win_cmd = f'irm {cdn}/{prefix}/install.ps1 | iex'
          am_mac_cmd = f'bash <(curl -fsSL {cdn}/{prefix}/install-amuxd.sh)'
          am_win_cmd = f'irm {cdn}/{prefix}/install-amuxd.ps1 | iex'

          APPLE_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.6c0-2 1.6-3 1.7-3-.9-1.3-2.3-1.5-2.8-1.5-1.2-.1-2.3.7-2.9.7s-1.5-.7-2.5-.7c-1.3 0-2.5.7-3.1 1.9-1.3 2.3-.3 5.7 1 7.5.6.9 1.3 1.9 2.3 1.9.9 0 1.2-.6 2.3-.6s1.4.6 2.4.6 1.6-.9 2.2-1.8c.7-1 1-2 1-2-.1 0-1.9-.7-1.9-2.6zM14.6 5.3c.5-.6.9-1.5.8-2.3-.8 0-1.7.5-2.2 1.1-.5.5-.9 1.4-.8 2.2.9.1 1.7-.4 2.2-1z"/></svg>'
          WIN_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.5 10.5 4.4v7.1H3V5.5zm0 13L10.5 19.6v-7H3v6.5zM11.5 4.3 21 3v8.5h-9.5V4.3zm0 8.2H21V21l-9.5-1.3v-7.2z"/></svg>'
          LINUX_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-2 0-3.2 1.7-3.2 4 0 1.4.3 2.2.3 3.2 0 1-.9 1.8-1.7 3.2-.8 1.4-1.7 2.9-1.7 4.6 0 .9.3 1.5.8 1.9-.1.5 0 1 .3 1.4.5.6 1.4.7 2.3.7.8 0 1.5-.3 2-.3.5 0 1.2.3 2 .3.9 0 1.8-.1 2.3-.7.3-.4.4-.9.3-1.4.5-.4.8-1 .8-1.9 0-1.7-.9-3.2-1.7-4.6-.8-1.4-1.7-2.2-1.7-3.2 0-1 .3-1.8.3-3.2C15.2 3.7 14 2 12 2zm-1.2 4.1c.4 0 .7.4.7.9s-.3.9-.7.9-.7-.4-.7-.9.3-.9.7-.9zm2.4 0c.4 0 .7.4.7.9s-.3.9-.7.9-.7-.4-.7-.9.3-.9.7-.9z"/></svg>'

          def _ico(d):
              o = d.get('os')
              return LINUX_SVG if o == 'linux' else (WIN_SVG if o == 'windows' else APPLE_SVG)

          def _card(d):
              return (
                  '        <div class="dl">'
                  f'<a class="dl-main" href="{html.escape(d["url"])}">'
                  f'<span class="dl-ico">{_ico(d)}</span>'
                  f'<span class="dlc"><span class="dl-label">{html.escape(d["label"])}</span>'
                  f'<span class="dl-sub">{html.escape(d.get("sub",""))} · {human(d["size"])}</span></span>'
                  '<span class="arr">↓</span></a>'
                  '<div class="sha-row"><span class="sha-k">SHA256</span>'
                  f'<code class="sha">{short_sha(d["sha256"])}</code>'
                  f'<button class="sha-copy" data-sha="{d["sha256"]}" '
                  'onclick="navigator.clipboard.writeText(this.dataset.sha);this.textContent=&#39;已复制&#39;;'
                  'setTimeout(()=>this.textContent=&#39;复制&#39;,1200)">复制</button></div></div>'
              )

          cards = '\n'.join(_card(d) for d in downloads)
          amuxd_cards = '\n'.join(_card(d) for d in amuxd_downloads)

          # Betly / www.mx5.cn visual language: dark theme + coral accent gradient.
          CSS = (
            ":root{--bg:#000;--bg-tertiary:#111;--bg-card:#141414;--bg-card-hover:#1a1a1a;"
            "--tx:#fff;--tx2:rgba(255,255,255,.7);--tx3:rgba(255,255,255,.5);--tx4:rgba(255,255,255,.35);"
            "--accent:#ff8b7b;--accent2:#ff6b5a;--glow:rgba(255,139,123,.4);"
            "--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.12);"
            "--grad:linear-gradient(135deg,#ff8b7b 0%,#ff6b5a 100%);color-scheme:dark}"
            "*{box-sizing:border-box;margin:0;padding:0}"
            "html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}"
            "body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;"
            "background:var(--bg);color:var(--tx);min-height:100vh;display:flex;justify-content:center;padding:72px 20px 56px;position:relative;overflow-x:hidden}"
            "body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,139,123,.15),transparent 70%);pointer-events:none;z-index:0}"
            ".card{width:100%;max-width:560px;text-align:center;position:relative;z-index:1}"
            ".logo{width:84px;height:84px;border-radius:22px;box-shadow:0 0 40px var(--glow),0 8px 30px rgba(0,0,0,.6);object-fit:cover}"
            ".badge{display:inline-flex;align-items:center;gap:6px;margin-top:22px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(255,139,123,.35);background:rgba(255,139,123,.08);border-radius:999px;padding:4px 13px}"
            ".badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--glow)}"
            "h1{font-size:38px;font-weight:800;margin:16px 0 6px;letter-spacing:-.03em;line-height:1.05}"
            ".meta{color:var(--tx3);font-size:14px;margin-bottom:34px}.meta b{color:var(--tx2);font-weight:600}"
            ".lbl{font-size:13px;color:var(--tx3);margin:0 0 9px;text-align:left;display:flex;align-items:center;gap:8px}"
            ".os{font-weight:700;color:var(--tx)}.os-ico{width:15px;height:15px;opacity:.85;flex:none}"
            ".cmd{display:flex;align-items:center;gap:10px;background:var(--bg-tertiary);border:1px solid var(--bd);color:var(--tx2);border-radius:12px;padding:13px 14px;margin-bottom:20px;font:13px/1.4 ui-monospace,'SF Mono',Menlo,monospace;text-align:left}"
            ".cmd code{flex:1;overflow-x:auto;white-space:nowrap}"
            ".copy{flex:none;cursor:pointer;border:0;background:var(--grad);color:#1a0e0b;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;transition:transform .12s,box-shadow .12s}"
            ".copy:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--glow)}"
            ".sep{display:flex;align-items:center;gap:14px;margin:30px 2px 16px;color:var(--tx4);font-size:12px;letter-spacing:.08em;text-transform:uppercase;border:0}"
            ".sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--bd)}"
            ".dl{background:var(--bg-card);border:1px solid var(--bd);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:border-color .15s,transform .15s,box-shadow .15s}"
            ".dl:hover{border-color:rgba(255,139,123,.4);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.6)}"
            ".dl-main{display:flex;align-items:center;gap:15px;text-decoration:none;color:inherit;padding:15px 18px 11px;text-align:left}"
            ".dl-ico{flex:none;width:38px;height:38px;border-radius:11px;background:var(--bg-card-hover);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--tx2)}"
            ".dl-ico svg{width:19px;height:19px}"
            ".dlc{flex:1;display:flex;flex-direction:column;min-width:0}"
            ".dl-label{font-weight:600;font-size:15px}.dl-sub{font-size:12.5px;color:var(--tx3);margin-top:2px}"
            ".arr{flex:none;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--accent);background:rgba(255,139,123,.1);font-size:16px;transition:background .15s}"
            ".dl:hover .arr{background:var(--grad);color:#1a0e0b}"
            ".sha-row{display:flex;align-items:center;gap:9px;padding:0 18px 13px;text-align:left}"
            ".sha-k{font:10px/1 ui-monospace,Menlo,monospace;color:var(--tx4);letter-spacing:.06em}"
            ".sha{font:11px/1 ui-monospace,Menlo,monospace;color:var(--tx3);flex:1;overflow:hidden;text-overflow:ellipsis}"
            ".sha-copy{flex:none;cursor:pointer;border:1px solid var(--bd2);background:transparent;color:var(--tx2);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;transition:border-color .12s,color .12s}"
            ".sha-copy:hover{border-color:var(--accent);color:var(--accent)}"
            "footer{margin-top:30px;font-size:12px;color:var(--tx4);line-height:1.7}"
            "footer code{display:inline-block;margin-top:6px;background:var(--bg-tertiary);border:1px solid var(--bd);color:var(--tx3);padding:6px 10px;border-radius:8px;font:11.5px/1.5 ui-monospace,Menlo,monospace}"
            # segmented TeamClaw / amuxd toggle
            ".seg{display:inline-flex;gap:4px;margin:22px 0 30px;padding:4px;background:var(--bg-tertiary);border:1px solid var(--bd);border-radius:12px}"
            ".seg button{cursor:pointer;border:0;background:transparent;color:var(--tx3);font-size:13.5px;font-weight:600;padding:8px 18px;border-radius:9px;transition:color .15s,background .15s}"
            ".seg button.on{color:#1a0e0b;background:var(--grad);box-shadow:0 2px 12px var(--glow)}"
            ".panel{display:none}.panel.on{display:block}"
            ".intro{color:var(--tx3);font-size:13px;line-height:1.6;margin:-8px 0 24px;text-align:left}"
          )

          page = (
            '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">'
            '<meta name="viewport" content="width=device-width, initial-scale=1">'
            '<meta name="robots" content="noindex">'
            '<link rel="preconnect" href="https://fonts.googleapis.com">'
            '<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'
            '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">'
            f'<title>TeamClaw {html.escape(tag)} · Beta</title><style>{CSS}</style></head><body>'
            '<div class="card">'
            f'<img class="logo" src="{logo_url}" alt="TeamClaw">'
            '<div><span class="badge"><span class="dot"></span> Beta 尝鲜版</span></div>'
            f'<h1>TeamClaw {html.escape(version)}</h1>'
            f'<div class="meta"><b>{html.escape(version)}</b> · 发布于 {pub_date[:10]}</div>'
            # --- TeamClaw / amuxd toggle ---
            '<div class="seg" role="tablist">'
            '<button class="on" data-p="teamclaw" onclick="pick(this)">TeamClaw 桌面</button>'
            '<button data-p="amuxd" onclick="pick(this)">amuxd 守护进程</button></div>'
            # --- panel: TeamClaw desktop ---
            '<div class="panel on" data-panel="teamclaw">'
            f'<div class="lbl"><span class="os-ico">{APPLE_SVG}</span><span class="os">macOS</span> 一键安装（终端）</div>'
            f'<div class="cmd"><code id="m">{html.escape(mac_cmd)}</code>'
            '<button class="copy" onclick="navigator.clipboard.writeText(m.textContent);this.textContent=&#39;已复制&#39;">复制</button></div>'
            f'<div class="lbl"><span class="os-ico">{WIN_SVG}</span><span class="os">Windows</span> 一键安装（PowerShell）</div>'
            f'<div class="cmd"><code id="w">{html.escape(win_cmd)}</code>'
            '<button class="copy" onclick="navigator.clipboard.writeText(w.textContent);this.textContent=&#39;已复制&#39;">复制</button></div>'
            '<div class="sep">或手动下载</div>'
            f'{cards}'
            '</div>'
            # --- panel: standalone amuxd ---
            '<div class="panel" data-panel="amuxd">'
            '<p class="intro">amuxd 是无界面的团队守护进程：把服务器/常开机器接入团队，'
            '托管本地 AI Agent 与团队同步。安装脚本会下载二进制、引导你粘贴 '
            '<code>teamclaw://invite</code> 邀请深链完成接入，并注册为开机自启的后台服务。</p>'
            f'<div class="lbl"><span class="os-ico">{APPLE_SVG}</span><span class="os">macOS / Linux</span> 一键安装（终端）</div>'
            f'<div class="cmd"><code id="am">{html.escape(am_mac_cmd)}</code>'
            '<button class="copy" onclick="navigator.clipboard.writeText(am.textContent);this.textContent=&#39;已复制&#39;">复制</button></div>'
            f'<div class="lbl"><span class="os-ico">{WIN_SVG}</span><span class="os">Windows</span> 一键安装（PowerShell）</div>'
            f'<div class="cmd"><code id="aw">{html.escape(am_win_cmd)}</code>'
            '<button class="copy" onclick="navigator.clipboard.writeText(aw.textContent);this.textContent=&#39;已复制&#39;">复制</button></div>'
            '<div class="sep">或手动下载二进制</div>'
            f'{amuxd_cards}'
            '<footer>手动安装：放到 <code>~/.amuxd/bin/amuxd</code> 后依次执行 '
            '<code>amuxd init</code> 与 <code>amuxd install-service</code>。</footer>'
            '</div>'
            '<footer>仅用于尝鲜测试。手动安装后首次打开若被拦截，终端执行：<br>'
            '<code>sudo xattr -dr com.apple.quarantine /Applications/TeamClaw.app</code></footer>'
            '</div>'
            '<script>function pick(b){'
            'document.querySelectorAll(".seg button").forEach(x=>x.classList.toggle("on",x===b));'
            'var p=b.dataset.p;'
            'document.querySelectorAll(".panel").forEach(x=>x.classList.toggle("on",x.dataset.panel===p));}'
            '</script>'
            '</body></html>'
          )

          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          endpoint = os.environ['OSS_ENDPOINT']
          if not endpoint.startswith('http'):
              endpoint = 'https://' + endpoint
          bucket = oss2.Bucket(auth, endpoint, os.environ['OSS_BUCKET'])

          short_cache = {'Cache-Control': 'max-age=60, must-revalidate'}
          json_ct = {'Content-Type': 'application/json; charset=utf-8'}

          # Mutable root pointer the installed app polls — must re-validate.
          bucket.put_object(f'{prefix}/latest.json', manifest_str.encode(),
                            headers={**short_cache, **json_ct})
          bucket.put_object(f'{prefix}/{tag}/latest.json', manifest_str.encode(), headers=json_ct)
          bucket.put_object(f'{prefix}/latest.txt', version.encode(),
                            headers={**short_cache, 'Content-Type': 'text/plain; charset=utf-8'})
          bucket.put_object(f'{prefix}/index.html', page.encode(),
                            headers={**short_cache, 'Content-Type': 'text/html; charset=utf-8'})
          bucket.put_object(f'{prefix}/install.sh', install_sh.encode(),
                            headers={**short_cache, 'Content-Type': 'text/x-shellscript; charset=utf-8'})
          bucket.put_object(f'{prefix}/install.ps1', install_ps1.encode(),
                            headers={**short_cache, 'Content-Type': 'text/plain; charset=utf-8'})
          # standalone amuxd install scripts
          bucket.put_object(f'{prefix}/install-amuxd.sh', install_amuxd_sh.encode(),
                            headers={**short_cache, 'Content-Type': 'text/x-shellscript; charset=utf-8'})
          bucket.put_object(f'{prefix}/install-amuxd.ps1', install_amuxd_ps1.encode(),
                            headers={**short_cache, 'Content-Type': 'text/plain; charset=utf-8'})

          # Logo for the page (checked out from the repo).
          for cand in ('packages/app/public/logo.png', 'apps/desktop/icons/teamclaw-logo.png'):
              if os.path.isfile(cand):
                  bucket.put_object_from_file(f'{prefix}/logo.png', cand,
                                              headers={'Cache-Control': 'max-age=3600', 'Content-Type': 'image/png'})
                  break

          print(f'✅ {cdn}/{prefix}/index.html')
          print(f'✅ {cdn}/{prefix}/latest.json  |  latest.txt -> {version}')
          print(f'✅ {cdn}/{prefix}/install.sh  |  install.ps1  |  logo.png')
          print(f'✅ {cdn}/{prefix}/install-amuxd.sh  |  install-amuxd.ps1  ({len(amuxd_downloads)} amuxd binaries)')
          EOF

      - name: Refresh CDN cache for mutable manifest files
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          # The mutable root files (latest.json / latest.txt / index.html /
          # install.*) are written with max-age=60, but the OSS CDN edge caches
          # them ~30 days regardless — so a fresh release is invisible to the
          # updater until the edge copy is purged. Invalidate them explicitly.
          # Version-pinned installers are immutable and never need refreshing.
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "::warning::OSS/CDN creds not configured — skipping CDN refresh"
            exit 0
          fi
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o /tmp/aliyun.tgz
          tar xzf /tmp/aliyun.tgz -C /tmp
          sudo mv /tmp/aliyun /usr/local/bin/aliyun
          aliyun configure set --profile cdn --mode AK \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET" \
            --region cn-shenzhen
          BASE="${CDN_BASE%/}/${OSS_PREFIX}"
          PATHS="$BASE/latest.json
          $BASE/latest.txt
          $BASE/index.html
          $BASE/install.sh
          $BASE/install.ps1
          $BASE/install-amuxd.sh
          $BASE/install-amuxd.ps1"
          echo "Refreshing CDN paths:"; echo "$PATHS"
          aliyun cdn RefreshObjectCaches --profile cdn --ObjectType File --ObjectPath "$PATHS"
          echo "✅ CDN refresh submitted for mutable manifest files"
