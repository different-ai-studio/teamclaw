name: Self-Host Deploy

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'deploy/self-host/**'
      - 'services/fc/**'
      - 'services/supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: self-host-production

    steps:
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: DEEPSEEK_API_KEY
          script: |
            set -e
            cd /opt/teamclaw

            echo "=== git pull ==="
            git fetch origin main
            git reset --hard origin/main

            cd deploy/self-host

            echo "=== ensure LiteLLM env ==="
            # The server's .env predates the bundled gateway and bootstrap/gen-secrets.sh
            # is NOT run here (it would re-mint ANON_KEY/SERVICE_ROLE_KEY with fresh
            # iat/exp on every deploy). Upsert only the LiteLLM keys, idempotently.
            upsert_env() { # $1=key $2=value — skip empty values rather than blanking a good one
              [ -n "$2" ] || { echo "  skip $1 (empty)"; return 0; }
              if grep -q "^$1=" .env; then
                awk -v k="$1" -v v="$2" 'BEGIN{FS=OFS="="} $1==k{print k"="v; next}{print}' .env > .env.tmp && mv .env.tmp .env
              else
                printf '%s=%s\n' "$1" "$2" >> .env
              fi
              echo "  set $1"
            }
            # Point FC at the bundled gateway explicitly. Left blank, FC's client
            # falls back to the hosted https://ai.ucar.cc.
            upsert_env LITELLM_URL "http://litellm:4000"
            # Admin credential for the gateway. Generated once on the server and then
            # preserved — rotating it would orphan every virtual key already issued
            # to a team in the _litellm database.
            if ! grep -qE '^LITELLM_MASTER_KEY=sk-' .env; then
              upsert_env LITELLM_MASTER_KEY "sk-$(openssl rand -hex 24)"
            else
              echo "  keep LITELLM_MASTER_KEY (already set)"
            fi
            if ! grep -qE '^LITELLM_UI_PASSWORD=.+' .env; then
              upsert_env LITELLM_UI_PASSWORD "$(openssl rand -hex 16)"
            fi
            upsert_env DEEPSEEK_API_KEY "$DEEPSEEK_API_KEY"

            echo "=== build fc ==="
            docker compose build fc

            echo "=== pull litellm (up --pull never will not fetch it) ==="
            docker compose pull litellm

            echo "=== up ==="
            docker compose up -d --pull never --remove-orphans

            echo "=== wait for litellm healthy (prisma migrate runs on first boot) ==="
            timeout 300 sh -c \
              'until docker compose ps litellm | grep -q healthy; do sleep 5; done'

            echo "=== wait for fc healthy ==="
            timeout 90 sh -c \
              'until docker compose ps fc | grep -q healthy; do sleep 5; done'

            echo "=== restart caddy (Caddyfile is a bind-mount; up -d / reload don't reliably pick up edits) ==="
            docker compose restart caddy
            timeout 60 sh -c \
              'until docker compose ps caddy | grep -q "Up\|running"; do sleep 3; done'

            echo "=== litellm smoke ==="
            sh /opt/teamclaw/deploy/self-host/smoke/litellm-smoke.sh

            echo "=== e2e verification ==="
            cd /opt/teamclaw/services/fc
            npm ci --prefer-offline --silent
            sh /opt/teamclaw/deploy/self-host/smoke/run-e2e.sh

            echo "=== deploy complete ==="
