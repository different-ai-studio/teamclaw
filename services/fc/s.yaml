edition: 3.0.0
name: teamclaw-fc
access: default

resources:
  teamclaw-sync:
    component: fc3
    props:
      region: cn-shenzhen
      # Defaults to the legacy shared function. Set FC_FUNCTION_NAME to target
      # another Function Compute function from this same s.yaml + services/fc code.
      functionName: ${env('FC_FUNCTION_NAME', 'teamclaw-sync')}
      runtime: nodejs20
      handler: dist/index.handler
      timeout: 30
      cpu: 0.4
      memorySize: 512
      diskSize: 512
      logConfig: auto
      internetAccess: true
      vpcConfig:
        vpcId: vpc-wz96ujjns2sochtdj0rav
        securityGroupId: sg-wz95jypmeanqrkpy4vi8
        vSwitchIds:
          - vsw-wz9ecwto44b29foo8id9r
      code: ./
      environmentVariables:
        ACCESS_KEY_ID: ${env('ACCESS_KEY_ID')}
        ACCESS_KEY_SECRET: ${env('ACCESS_KEY_SECRET')}
        ROLE_ARN: ${env('ROLE_ARN')}
        BUCKET: teamclaw-team
        REGION: cn-shenzhen
        ENDPOINT: https://oss-cn-shenzhen.aliyuncs.com
        LITELLM_URL: ${env('LITELLM_URL', 'https://ai.ucar.cc')}
        LITELLM_MASTER_KEY: ${env('LITELLM_MASTER_KEY', '')}
        # Blank = no cap, matching the compose default. Keep the two targets in
        # step: a default that differs per target is how the $1 cap went unnoticed.
        LITELLM_DEFAULT_TEAM_MAX_BUDGET_USD: ${env('LITELLM_DEFAULT_TEAM_MAX_BUDGET_USD', '')}
        # LiteLLM usage reads the `litellm` database on the SAME Postgres instance
        # as the primary FC connection (DATABASE_URL/POSTGRES_*); only the db name
        # differs. Override the db name here if it is not `litellm`.
        LITELLM_DB_NAME: ${env('LITELLM_DB_NAME', 'litellm')}
        CODEUP_ORG_ID: ${env('CODEUP_ORG_ID', '')}
        CODEUP_PAT: ${env('CODEUP_PAT', '')}
        CODEUP_BOT_USERNAME: ${env('CODEUP_BOT_USERNAME', 'teamclaw')}
        # Admin connection to the shared per-app Postgres DB (teamclaw_apps),
        # same RDS instance as the control plane but a DIFFERENT database. Used
        # only by apps provisioning (CREATE SCHEMA / CREATE ROLE). Never sent
        # to clients.
        APPS_DB_ADMIN_URL: ${env('APPS_DB_ADMIN_URL', '')}
        PUSH_WEBHOOK_SECRET: ${env('PUSH_WEBHOOK_SECRET')}
        SUPABASE_URL: ${env('SUPABASE_URL')}
        SUPABASE_PUBLIC_URL: ${env('SUPABASE_PUBLIC_URL', '')}
        SUPABASE_SERVICE_ROLE_KEY: ${env('SUPABASE_SERVICE_ROLE_KEY')}
        SUPABASE_ANON_KEY: ${env('SUPABASE_ANON_KEY')}
        APNS_PRIVATE_KEY_P8: ${env('APNS_PRIVATE_KEY_P8')}
        APNS_KEY_ID: ${env('APNS_KEY_ID')}
        APNS_TEAM_ID: ${env('APNS_TEAM_ID')}
        APNS_TOPIC: ${env('APNS_TOPIC')}
        APNS_ENV: ${env('APNS_ENV')}
        MQTT_BROKER_URL: ${env('MQTT_BROKER_URL')}
        MQTT_USERNAME: ${env('MQTT_USERNAME')}
        MQTT_PASSWORD: ${env('MQTT_PASSWORD')}
        MQTT_USE_TLS: ${env('MQTT_USE_TLS', '')}
        WEBSSO_LOGIN_URL: ${env('WEBSSO_LOGIN_URL', '')}
        WEBSSO_STORAGE_KEY: ${env('WEBSSO_STORAGE_KEY', '')}
        # Set to true when a reverse proxy (Caddy/FC gateway) handles CORS so
        # Hono's own CORS middleware is skipped — prevents duplicate headers.
        CORS_HANDLED_BY_PROXY: ${env('CORS_HANDLED_BY_PROXY', '')}
        DATABASE_URL: ${env('DATABASE_URL', '')}
        BACKEND_KIND: ${env('BACKEND_KIND', 'supabase')}
        # Phone login (partner-aligned). DEFAULT_ORG_ID = the default tenant new
        # users join; PHONE_EMAIL_DOMAIN = domain of the synthetic auth email
        # (`<phone>@<domain>`) and therefore half the account identity — it must
        # match the partner SaaS sharing this GoTrue, or phone users get a
        # parallel set of accounts; PHONE_AUTH_ENCRYPTION_KEY salts the
        # placeholder password for newly-created phone users (never
        # re-verified); SMS_DEBUG_MODE returns the code in the response instead
        # of sending SMS (dev only).
        DEFAULT_ORG_ID: ${env('DEFAULT_ORG_ID', '')}
        PHONE_EMAIL_DOMAIN: ${env('PHONE_EMAIL_DOMAIN', '')}
        PHONE_AUTH_ENCRYPTION_KEY: ${env('PHONE_AUTH_ENCRYPTION_KEY', '')}
        SMS_DEBUG_MODE: ${env('SMS_DEBUG_MODE', '')}
        AUTH_SECRET: ${env('AUTH_SECRET', '')}
        AUTH_BASE_URL: ${env('AUTH_BASE_URL', 'https://cloud.ucar.cc')}
        PG_POOL_MAX: ${env('PG_POOL_MAX', '1')}
        OTP_EMAIL_SMTP_HOST: ${env('OTP_EMAIL_SMTP_HOST', '')}
        OTP_EMAIL_SMTP_PORT: ${env('OTP_EMAIL_SMTP_PORT', '')}
        OTP_EMAIL_SMTP_USER: ${env('OTP_EMAIL_SMTP_USER', '')}
        OTP_EMAIL_SMTP_PASS: ${env('OTP_EMAIL_SMTP_PASS', '')}
        OTP_EMAIL_SMTP_FROM: ${env('OTP_EMAIL_SMTP_FROM', '')}
        APPLE_CLIENT_ID: ${env('APPLE_CLIENT_ID', '')}
        APPLE_CLIENT_SECRET: ${env('APPLE_CLIENT_SECRET', '')}
        GOOGLE_CLIENT_ID: ${env('GOOGLE_CLIENT_ID', '')}
        GOOGLE_CLIENT_SECRET: ${env('GOOGLE_CLIENT_SECRET', '')}
      triggers:
        # Trigger name is parameterized so we can adopt a pre-existing function's
        # http trigger (FC console default is `defaultTrigger`). Defaults to
        # http-trigger for the legacy teamclaw-sync function.
        - triggerName: ${env('FC_HTTP_TRIGGER_NAME', 'http-trigger')}
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
        - triggerName: oss-abandon-sessions
          triggerType: timer
          triggerConfig:
            cronExpression: '0 */15 * * * *'
            enable: true
            payload: '{"task":"oss-abandon-sessions"}'
        - triggerName: oss-gc-blobs
          triggerType: timer
          triggerConfig:
            cronExpression: '0 17 4 * * *'
            enable: true
            payload: '{"task":"oss-gc-blobs"}'
